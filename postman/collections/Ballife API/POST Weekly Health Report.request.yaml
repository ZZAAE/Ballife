$kind: http-request
name: 'POST Weekly Health Report'
method: POST
url: '{{baseUrl}}/api/health-report/weekly/{{userId}}'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ── Status checks ──────────────────────────────────────────────
      pm.test("Status 200 OK", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response time < 5000ms (AI report generation allowed extra time)", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      // ── Body structure ──────────────────────────────────────────────
      pm.test("Response is a JSON object", function () {
          pm.response.to.be.json;
          const body = pm.response.json();
          pm.expect(body).to.be.an("object");
      });

      pm.test("Report contains a non-empty content or report field", function () {
          const body = pm.response.json();
          const reportText = body.content || body.report || body.message || body.result;
          pm.expect(reportText).to.be.a("string").and.to.have.length.above(0);
      });

      // ── Debug helpers ───────────────────────────────────────────────
      const status = pm.response.code;
      if (status === 401) {
          console.error("[401 Unauthorized] JWT token is missing or expired. " +
              "Set the `token` environment variable to a valid Bearer token, " +
              "or whitelist /api/health-report/** in Spring Security config.");
      } else if (status === 404) {
          console.warn("[404 Not Found] No weekly data found for userId=" +
              pm.environment.get("userId") +
              ". Ensure the user has blood pressure, blood sugar, meal, exercise, " +
              "and medication records for the past 7 days.");
      } else if (status === 400) {
          console.warn("[400 Bad Request] Check request body and userId. " +
              "Response: " + pm.response.text());
      } else if (status === 500) {
          console.error("[500 Internal Server Error] This may be an OpenAI API error " +
              "(invalid key, quota exceeded, or network issue). " +
              "Check Spring Boot logs and your OPENAI_API_KEY env variable. " +
              "Response: " + pm.response.text());
      }
