spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/project_ballife?serverTimezone=Asia/Seoul
    username: ballife
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update # 실서버에서는 validate로 설정해야 한다!
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format-sql: true

  data:
    mongodb:
      host: localhost #배포할때는 실제 서버 주소가 들어감
      port: 27017
      database: Ballife # 데이터베이스명
      auto-index-creation: true # @Indexed(unique=true) 등 인덱스 자동 생성 (itemSeq 중복 저장 방지)

  security:
    jwt:
      secret: your-super-secret-key-that-is-at-least-64-bytes-long-for-hs512-to-work-correctly
      expiration: 86400000 #토큰 만료시간 (24시간 = 밀리초)

openai:
  api-key: ${OPENAI_API_KEY:default}
  model: gpt-4o-mini # 모델버젼
  max-tokens: 1000 #응답 길이
  vision-detail: low

server:
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.hibernate.SQL: debug #SQL 쿼리 로그 출력

springdoc:
  swagger-ui:
    path: /swagger-ui.html #API 문서 접속 경로
    enabled: true
    use-root-path: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true

mfds:
  api:
    base-url: https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07
    service-key: ${MFDS_KEY:} # 식약처 의약품 허가 정보 API 인증키 (data.go.kr 발급, 디코딩 키 권장) — 환경변수 MFDS_KEY 사용

# 식약처 식품영양성분DB v2 (data.go.kr) — 음식 사진 분석 → 영양정보 조회
foodsafety:
  api:
    base-url: https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo02
    operation: getFoodNtrCpntDbInq02 # v02 표준 작업명
    service-key: ${FOOD_SAFETY_KEY:} # data.go.kr 발급 인증키 (디코딩 키 권장) — 환경변수 FOOD_SAFETY_KEY 사용

# 음식 사진 등 업로드 파일 로컬 저장 경로
# - 운영 시 S3/CDN으로 교체 예정
# - 한글/공백 포함 경로는 forward slash + 따옴표 사용
storage:
  type: local
  local:
    base-path: "C:/Users/dlaud/OneDrive/바탕 화면/프로젝트_임시저장_이미지"
    url-prefix: /uploads

    #단계별로 스페이스 2칸
    #탭 사용 금지

NaverOcr:
  api:
    base-url: ${NAVER_OCR_BASE_URL:}
    secret-key: ${NAVER_OCR_SECRET_KEY:}
