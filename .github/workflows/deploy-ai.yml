# ============================================================
# Ballife AI 서버 배포 워크플로
#   main push → ai-service 이미지 빌드 → GHCR push
#   → AI 서버 SSH → /home/rocky/ballife 에 compose/.env/model 생성 → compose up
#
# 모델(best.pt)은 git/이미지에 없음 → 서버 ~/ballife/model/ 에 수동 scp 후 볼륨 마운트.
#
# Secrets:
#   GABIA_AI_HOST     AI 서버 공인 IP
#   GABIA_SSH_KEY     SSH 개인키
#   GABIA_USER        SSH 사용자 (rocky)
#   GABIA_SSH_PORT    SSH 포트 (22)
#   GABIA_OPENAI_KEY  OpenAI API Key → 서버 .env 의 OPENAI_API_KEY 로 기록
#   ※ GABIA_AI_KNOWN_HOSTS 는 appleboy/ssh-action 이 사용하지 않음(미사용, 둬도 무방).
# 주의: job-level if 에서는 secrets 를 못 쓴다(Unrecognized named-value) → if 엔 ref 만,
#       secret 유무는 ssh script 안에서 [ -z "$VAR" ] 로 검사한다.
# ============================================================
name: Deploy AI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 소유자명 소문자화(GHCR 요구)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 & 푸시 — ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ai-service:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ai:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: AI 서버 SSH 배포
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPENAI_API_KEY: ${{ secrets.GABIA_OPENAI_KEY }}
        with:
          host: ${{ secrets.GABIA_AI_HOST }}
          username: ${{ secrets.GABIA_USER }}
          key: ${{ secrets.GABIA_SSH_KEY }}
          port: ${{ secrets.GABIA_SSH_PORT }}
          envs: OPENAI_API_KEY
          script: |
            set -e

            # secret 유무 검사 (job-level if 에서 secrets 사용 금지 → shell 에서 검사)
            if [ -z "$OPENAI_API_KEY" ]; then
              echo "::warning::OPENAI_API_KEY(GABIA_OPENAI_KEY) 가 비어있습니다 - 챗봇/분석이 동작하지 않습니다."
            fi

            # 1) 폴더 생성 (model 폴더 포함)
            mkdir -p /home/rocky/ballife/model
            cd /home/rocky/ballife

            # 2) docker-compose.yml 생성 (변수는 .env 가 채움 → 따옴표 heredoc 로 리터럴 기록)
            cat > docker-compose.yml <<'EOF'
            services:
              ai-service:
                image: ${IMAGE_PREFIX}/ai-service:${IMAGE_TAG}
                container_name: ballife-ai-service
                restart: always
                ports:
                  - "8001:8001"
                env_file:
                  - .env
                volumes:
                  - ./model:/app/model:ro
            EOF

            # 3) .env 생성 ('=' 뒤 공백 없이. 키는 printf 로 정확히 기록)
            cat > .env <<'EOF'
            IMAGE_PREFIX=ghcr.io/zzaae
            IMAGE_TAG=latest
            OPENAI_MODEL=gpt-4o-mini
            OPENAI_TIMEOUT_SECONDS=45
            SPRING_API_URL=http://192.168.0.35:8080
            EOF
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env

            # 4) 배포
            docker compose pull
            docker compose up -d --force-recreate

            # 5) 확인
            docker ps
            docker compose logs --tail=50 ai-service
