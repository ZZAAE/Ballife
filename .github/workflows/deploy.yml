# ============================================================
# Ballife 배포 워크플로 — front / backend
#   (AI 서버는 별도 워크플로 deploy-ai.yml 에서 처리)
#   1) 이미지 2개(frontend/backend) 빌드 → GHCR 푸시
#   2) front/backend 서버에 SSH 접속 → docker compose pull & up
#
# 필요한 GitHub Secrets
#   [공통]  GABIA_SSH_KEY / GABIA_USER / GABIA_SSH_PORT
#           GHCR_PAT (선택; 패키지 public 이면 불필요)
#   [서버별 HOST]  front: GABIA_HOST   backend: GABIA_BACKEND_HOST
#   ※ if 조건엔 secrets 를 못 씀(깃헙 제약) → main 푸시면 두 서버 모두 배포 시도.
#   ※ mysql/mongo 는 데이터 서버라 CI 대상 아님(최초 1회 수동 설치).
#   ※ 각 서버의 ~/ballife 에 그 서버용 docker-compose.yml + .env 가 미리 있어야 함.
# ============================================================
name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            build_args: |
              VITE_API_BASE_URL=/api
              VITE_AI_BASE_URL=/ai
          - name: backend
            context: ./ballife
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - name: 소유자명 소문자화(GHCR 요구)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 빌드 & 푸시 — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 앱 서버 배포 (시크릿이 설정된 서버에만 실행) ----------
  deploy-front:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH 배포 — front 서버
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GABIA_HOST }}
          username: ${{ secrets.GABIA_USER }}
          key: ${{ secrets.GABIA_SSH_KEY }}
          port: ${{ secrets.GABIA_SSH_PORT }}
          script: |
            set -e
            cd ~/ballife
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi
            export IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="${{ github.sha }}"
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH 배포 — backend 서버
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GABIA_BACKEND_HOST }}
          username: ${{ secrets.GABIA_USER }}
          key: ${{ secrets.GABIA_SSH_KEY }}
          port: ${{ secrets.GABIA_SSH_PORT }}
          script: |
            set -e
            cd ~/ballife
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi
            export IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="${{ github.sha }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
