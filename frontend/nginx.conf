# ============================================================
# Ballife 프론트엔드 nginx 설정
#   - React(Vite) 정적 빌드(SPA) 서빙
#   - /api      → 백엔드(Spring Boot) 리버스 프록시
#   - /uploads  → 백엔드가 서빙하는 업로드 이미지 프록시
#   - /ai       → AI 서비스(FastAPI) 리버스 프록시 (챗봇·음식분석)
#   - Unity WebGL 대용량 에셋(.wasm/.data) MIME·캐시 처리
# 이 파일은 이미지의 /etc/nginx/conf.d/default.conf 로 복사된다.
# ============================================================

# 업스트림 = docker-compose 서비스명. 배포 환경이 다르면 여기만 수정.
upstream ballife_backend {
    server backend:8080;
}
upstream ballife_ai {
    server ai-service:8001;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # 업로드(이미지/처방전 OCR) 멀티파트 대비 — 백엔드 multipart 한도와 맞출 것
    client_max_body_size 20m;

    # gzip: 텍스트 자산만. Unity .wasm/.data 같은 대용량 바이너리는 제외(실시간 압축 비용↑)
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # 공통 프록시 헤더
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---------- API 프록시 (경로 /api 유지: 백엔드가 /api 컨텍스트) ----------
    location /api/ {
        proxy_pass http://ballife_backend;
        # 리포트 PDF 생성 / LLM 등 오래 걸리는 요청 대비
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # ---------- 업로드 이미지 프록시 ----------
    location /uploads/ {
        proxy_pass http://ballife_backend;
    }

    # ---------- AI 서비스 프록시 (/ai 접두어 제거 후 전달) ----------
    # 예: /ai/chat → ai-service 의 /chat , /ai/analyze → /analyze
    location /ai/ {
        proxy_pass http://ballife_ai/;
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;   # 챗봇 LLM 응답 대기
        proxy_send_timeout    300s;
    }

    # ---------- Unity WebGL 에셋 ----------
    # .wasm 은 application/wasm 으로 내려야 WebAssembly 스트리밍 컴파일이 동작한다.
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /Unity/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---------- 해시 붙은 빌드 자산(장기 캐시) ----------
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---------- SPA 라우팅 ----------
    # 실제 파일이 없으면 index.html 로 폴백 → react-router 가 처리
    location / {
        try_files $uri $uri/ /index.html;
    }
}
