<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Ballife Pet</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f9fafb;
        overflow: hidden;
      }
      #unity-container {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #f9fafb;
      }
      #unity-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Noto Sans KR", sans-serif;
        color: #64748b;
        gap: 10px;
      }
      #bar {
        width: 60%;
        max-width: 240px;
        height: 6px;
        background: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
      }
      #bar > div {
        height: 100%;
        width: 0%;
        background: #0f172a;
        transition: width 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading">
        <div>펫 불러오는 중…</div>
        <div id="bar"><div id="bar-fill"></div></div>
      </div>
    </div>
    <script src="Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loading = document.querySelector("#unity-loading");
      var barFill = document.querySelector("#bar-fill");
      createUnityInstance(canvas, {
        dataUrl: "Build.data",
        frameworkUrl: "Build.framework.js",
        codeUrl: "Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Ballife",
        productName: "Pet",
        productVersion: "1.0",
      }, function (progress) {
        if (barFill) barFill.style.width = Math.round(progress * 100) + "%";
      })
        .then(function () {
          if (loading) loading.style.display = "none";
        })
        .catch(function (e) {
          if (loading)
            loading.innerHTML =
              '<div style="padding:16px;text-align:center">펫을 불러오지 못했습니다.<br/>' +
              (e && e.message ? e.message : e) +
              "</div>";
        });
    </script>
  </body>
</html>
