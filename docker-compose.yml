# ============================================================
# Ballife 전체 스택 — 로컬/서버 공용
#   로컬 빌드 실행:  docker compose up -d --build
#   레지스트리 배포:  IMAGE_PREFIX=ghcr.io/<owner> IMAGE_TAG=<tag> docker compose pull && docker compose up -d
# 비밀값/포트는 같은 폴더의 .env 로 주입 (.env.example 복사해서 작성).
# ============================================================
name: ballife

services:
  # ---------- MySQL (회원/기록 등 관계형 데이터) ----------
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: project_ballife
      MYSQL_USER: ${MYSQL_USER:-ballife}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-1234}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      TZ: Asia/Seoul
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------- MongoDB (의약품 캐시 등 문서 데이터) ----------
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------- AI 서비스 (FastAPI + YOLO 음식분류 + LLM 챗봇) ----------
  ai-service:
    image: ${IMAGE_PREFIX:-ballife}/ai-service:${IMAGE_TAG:-latest}
    build:
      context: ./ai-service
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SPRING_API_URL: http://backend:8080   # AI → 백엔드 호출용
      TZ: Asia/Seoul
    expose:
      - "8001"   # 외부 노출 불필요 — 프론트 nginx 가 /ai 로 프록시

  # ---------- 백엔드 (Spring Boot) ----------
  backend:
    image: ${IMAGE_PREFIX:-ballife}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./ballife
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/project_ballife?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ballife}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-1234}
      SPRING_DATA_MONGODB_HOST: mongo
      SPRING_DATA_MONGODB_PORT: "27017"
      SPRING_DATA_MONGODB_DATABASE: Ballife
      AISERVICE_BASE_URL: http://ai-service:8001
      # JWT 비밀키: 미설정 시 64바이트 기본값(HS512 동작 보장). 운영에선 .env 로 교체 권장.
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-that-is-at-least-64-bytes-long-for-hs512-to-work-correctly}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MFDS_SERVICE_KEY: ${MFDS_SERVICE_KEY:-}
      FOOD_SAFETY_KEY: ${FOOD_SAFETY_KEY:-}
      NAVER_OCR_BASE_URL: ${NAVER_OCR_BASE_URL:-}
      NAVER_OCR_SECRET_KEY: ${NAVER_OCR_SECRET_KEY:-}
      STORAGE_BASE_PATH: /app/uploads
      TZ: Asia/Seoul
    volumes:
      - uploads_data:/app/uploads   # 업로드 이미지 영속화
    expose:
      - "8080"   # 외부 노출 불필요 — 프론트 nginx 가 /api 로 프록시

  # ---------- 프론트엔드 (React 빌드 + nginx, 유일한 공개 진입점) ----------
  frontend:
    image: ${IMAGE_PREFIX:-ballife}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_AI_BASE_URL: /ai
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  mongo_data:
  uploads_data:
